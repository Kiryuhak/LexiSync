<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --bg-main: #ffffff;
            --text-main: #333333;
            --text-icon: #5f6368;
            --header-text: #6750A4;
            --hover-bg: #f0f2f5;
            --border: #eaeaea;
        }
        [data-theme="dark"] {
            --bg-main: #202124;
            --text-main: #e8eaed;
            --text-icon: #9aa0a6;
            --header-text: #d0bcff;
            --hover-bg: #3c4043;
            --border: #3c4043;
        }

        body { width: 200px; margin: 0; font-family: system-ui, -apple-system, sans-serif; padding: 8px; background: var(--bg-main); color: var(--text-main); }
        .header { font-size: 14px; font-weight: 600; color: var(--header-text); margin-bottom: 4px; padding: 10px 12px; display: flex; align-items: center; gap: 12px; user-select: none; }
        .btn { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px; cursor: pointer; transition: background 0.2s; font-size: 14px; font-weight: 500; color: var(--text-main); border: none; background: transparent; width: 100%; text-align: left; box-sizing: border-box; }
        .btn:hover { background: var(--hover-bg); }
        .icon-wrapper { display: flex; align-items: center; justify-content: center; width: 20px; height: 20px; color: var(--text-icon); }
        .divider { height: 1px; background: var(--border); margin: 4px 8px; }
    </style>
</head>
<body>
    <div class="header">
        <span class="icon-wrapper">
            <img src="icons/icon-48.png" width="18" height="18" style="border-radius: 4px; display: block;" alt="AI">
        </span>
        <span>AI Spell & Emoji</span>
    </div>
    
    <div class="divider"></div>
    
    <button class="btn" id="btn-history">
        <span class="icon-wrapper" style="color: var(--header-text);">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        </span>
        <span>История</span>
    </button>
    
    <button class="btn" id="btn-options">
        <span class="icon-wrapper">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </span>
        <span>Настройки</span>
    </button>

    <script src="popup.js"></script>
</body>
</html>
